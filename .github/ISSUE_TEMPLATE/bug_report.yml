name: Bug report
description: Report a reproducible runtime, deployment or documentation issue.
title: 'bug: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what failed and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include exact commands, endpoint calls or workflow steps.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Include relevant logs with secrets removed.
      render: shell
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Worker
        - Database
        - Queue
        - Billing
        - HTTP connector
        - Deployment
        - Documentation
        - CI
    validations:
      required: true
