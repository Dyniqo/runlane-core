name: Verification and container images

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_images:
        description: Publish API, worker and migrator images to GHCR
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: runlane-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.16.0'
  PNPM_VERSION: '10.0.0'
  NPM_REGISTRY: https://registry.npmjs.org/
  PRISMA_ENGINES_MIRROR: https://binaries.prisma.sh
  DATABASE_URL: postgresql://runlane:runlane_ci_database@127.0.0.1:5432/runlane?schema=public
  REDIS_URL: redis://127.0.0.1:6379/0
  RUNTIME_PROFILE: local
  API_URL: http://127.0.0.1:4600
  APP_URL: http://127.0.0.1:4600
  JWT_ACCESS_SECRET: runlane_ci_access_secret_change_me_64_bytes_minimum_value
  JWT_REFRESH_SECRET: runlane_ci_refresh_secret_change_me_64_bytes_minimum_value
  ENCRYPTION_KEY: runlane_ci_encryption_key_change_me_64_bytes_minimum_value
  WEBHOOK_SIGNING_SECRET: runlane_ci_webhook_signing_secret_change_me_64_bytes_minimum_value
  STRIPE_WEBHOOK_SECRET: runlane_ci_stripe_webhook_secret_change_me_64_bytes_minimum_value
  STRIPE_API_KEY: '12341234123412341234123412341234'
  CORS_ORIGIN: http://127.0.0.1:4600,http://localhost:4600
  PUBLIC_REGISTRATION_ENABLED: 'true'
  DEMO_MODE: 'true'
  DEMO_SESSION_ENABLED: 'true'
  DEMO_USER_PASSWORD: RunlaneDemoPassword123!

jobs:
  verify:
    name: Verify source and migrations
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17.10-alpine3.23
        env:
          POSTGRES_USER: runlane
          POSTGRES_PASSWORD: runlane_ci_database
          POSTGRES_DB: runlane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runlane -d runlane"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.6.4-alpine3.23
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure package registry
        shell: bash
        run: |
          pnpm config set registry "$NPM_REGISTRY"
          npm config set registry "$NPM_REGISTRY"
          echo "pnpm registry: $(pnpm config get registry)"
          echo "npm registry: $(npm config get registry)"
          echo "pnpm fetch retries: $(pnpm config get fetch-retries)"
          echo "pnpm network timeout: $(pnpm config get network-timeout)"
          test "$(pnpm config get registry)" = "$NPM_REGISTRY"
          test "$(npm config get registry)" = "$NPM_REGISTRY"
          test "$(pnpm config get fetch-retries)" = "5"
          test "$(pnpm config get network-timeout)" = "300000"

      - name: Install dependencies
        shell: bash
        run: |
          pnpm fetch --frozen-lockfile
          pnpm install --frozen-lockfile --prefer-offline

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Run verification
        run: pnpm verify

  container-images:
    name: Build and publish container images
    runs-on: ubuntu-24.04
    needs: verify
    timeout-minutes: 45
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            target: api
            image: api
          - service: worker
            target: worker
            image: worker
          - service: migrator
            target: migrator
            image: migrator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image coordinates
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repository="${GITHUB_REPOSITORY#*/}"
          repository="${repository,,}"
          channel="${GITHUB_REF_NAME,,}"
          channel="$(printf '%s' "$channel" | tr -c 'a-z0-9_.-' '-')"
          channel="${channel:0:120}"
          echo "name=ghcr.io/${owner}/${repository}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          build-args: |
            NPM_REGISTRY=${{ env.NPM_REGISTRY }}
            PRISMA_ENGINES_MIRROR=${{ env.PRISMA_ENGINES_MIRROR }}
            DATABASE_URL=postgresql://runlane:runlane_build@127.0.0.1:5432/runlane?schema=public
          labels: |
            org.opencontainers.image.title=Runlane Core ${{ matrix.service }}
            org.opencontainers.image.description=Runlane Core ${{ matrix.service }} runtime image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.channel }}
          cache-from: type=gha,scope=runlane-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=runlane-${{ matrix.target }}
          provenance: false

      - name: Report published image
        shell: bash
        run: |
          echo "image=${{ steps.image.outputs.name }}"
          echo "shaTag=sha-${{ github.sha }}"
          echo "channelTag=${{ steps.image.outputs.channel }}"
          echo "digest=${{ steps.build.outputs.digest }}"
