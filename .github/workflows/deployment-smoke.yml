name: Deployment image smoke

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Commit SHA to smoke test. Leave empty to use this workflow revision.
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: runlane-deployment-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke test image deployment stack
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    env:
      COMPOSE_FILE: docker-compose.deploy.yml
      ENV_FILE: .env.deploy.smoke
      COMPOSE_PROJECT_NAME: runlane-smoke-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create smoke environment
        shell: bash
        run: |
          image_tag="${{ inputs.image_tag }}"
          image_tag="${image_tag#sha-}"
          if [[ -z "$image_tag" ]]; then
            image_tag="${GITHUB_SHA}"
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repository="${GITHUB_REPOSITORY#*/}"
          repository="${repository,,}"
          postgres_password="$(openssl rand -hex 32)"
          jwt_access_secret="$(openssl rand -hex 48)"
          jwt_refresh_secret="$(openssl rand -hex 48)"
          encryption_key="$(openssl rand -hex 48)"
          webhook_secret="$(openssl rand -hex 48)"
          stripe_webhook_secret="$(openssl rand -hex 32)"

          cat > "$ENV_FILE" <<EOF_ENV
          RUNLANE_COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
          RUNLANE_IMAGE_REGISTRY=ghcr.io
          RUNLANE_IMAGE_NAMESPACE=${owner}
          RUNLANE_IMAGE_REPOSITORY=${repository}
          RUNLANE_IMAGE_TAG=sha-${image_tag}
          RUNLANE_WEB_DOMAIN=http://runlane.localhost
          RUNLANE_API_DOMAIN=http://api.runlane.localhost
          RUNLANE_HTTP_PORT=18080
          RUNLANE_HTTPS_PORT=18443
          RUNLANE_CADDY_MAX_REQUEST_BODY=2MB
          POSTGRES_USER=runlane
          POSTGRES_PASSWORD=${postgres_password}
          POSTGRES_DB=runlane
          API_URL=http://127.0.0.1:18080
          APP_URL=http://127.0.0.1:18080
          CORS_ORIGIN=http://127.0.0.1:18080
          JWT_ACCESS_SECRET=${jwt_access_secret}
          JWT_REFRESH_SECRET=${jwt_refresh_secret}
          ENCRYPTION_KEY=${encryption_key}
          WEBHOOK_SIGNING_SECRET=${webhook_secret}
          STRIPE_WEBHOOK_SECRET=${stripe_webhook_secret}
          STRIPE_CHECKOUT_SUCCESS_URL=http://127.0.0.1:18080/billing/success
          STRIPE_CHECKOUT_CANCEL_URL=http://127.0.0.1:18080/billing/cancel
          STRIPE_PORTAL_RETURN_URL=http://127.0.0.1:18080/billing
          PUBLIC_REGISTRATION_ENABLED=false
          DEMO_MODE=false
          DEMO_SESSION_ENABLED=false
          LOG_LEVEL=info
          API_DOCS_ENABLED=false
          EOF_ENV

      - name: Validate deployment Compose
        shell: bash
        run: |
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" config --quiet

      - name: Validate Caddyfile
        shell: bash
        run: |
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" run --rm --no-deps --entrypoint caddy caddy validate --config /etc/caddy/Caddyfile

      - name: Pull deployment images
        shell: bash
        run: |
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" pull

      - name: Run deployment migrations
        shell: bash
        run: |
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up --abort-on-container-exit --exit-code-from migrator migrator

      - name: Start deployment services
        shell: bash
        run: |
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d api worker web caddy

      - name: Wait for API readiness through Caddy
        shell: bash
        run: |
          for attempt in $(seq 1 36); do
            if curl --fail --silent --header "Host: api.runlane.localhost" http://127.0.0.1:18080/health/ready > /dev/null; then
              echo "API is ready through Caddy."
              exit 0
            fi

            caddy_id="$(docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps -q caddy || true)"
            if [[ -n "$caddy_id" ]]; then
              caddy_status="$(docker inspect --format='{{.State.Status}}' "$caddy_id")"
              echo "Caddy status: ${caddy_status}"
              if [[ "$caddy_status" == "restarting" || "$caddy_status" == "exited" || "$caddy_status" == "dead" ]]; then
                docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --no-color --tail=200 caddy || true
                exit 1
              fi
            fi

            echo "Waiting for API readiness through Caddy: attempt ${attempt}/36"
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps --all
            sleep 5
          done

          echo "API did not become ready through Caddy."
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --no-color --tail=200 caddy || true
          exit 1

      - name: Verify deployment stack
        shell: bash
        run: |
          migrator_id="$(docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps --all -q migrator)"
          test -n "$migrator_id"
          migrator_exit_code="$(docker inspect --format='{{.State.ExitCode}}' "$migrator_id")"
          echo "migrator exit code: ${migrator_exit_code}"
          test "$migrator_exit_code" = "0"

          for service in postgres redis api worker caddy; do
            container_id="$(docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps -q "$service")"
            test -n "$container_id"
            state="$(docker inspect --format='{{.State.Running}}' "$container_id")"
            echo "${service} running: ${state}"
            test "$state" = "true"
          done

          for attempt in $(seq 1 36); do
            pending=0

            for service in postgres redis api worker caddy; do
              container_id="$(docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps -q "$service")"
              health="$(docker inspect --format='{{.State.Health.Status}}' "$container_id")"
              echo "${service} health: ${health}"

              if [[ "$health" != "healthy" ]]; then
                pending=1
              fi
            done

            if [[ "$pending" = "0" ]]; then
              echo "Deployment service health checks are ready."
              break
            fi

            if [[ "$attempt" = "36" ]]; then
              echo "Deployment service health checks did not become ready."
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps --all
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --no-color --tail=200 caddy || true
              exit 1
            fi

            echo "Waiting for deployment service health checks: attempt ${attempt}/36"
            sleep 5
          done

          curl --fail --silent --header "Host: api.runlane.localhost" http://127.0.0.1:18080/health > /dev/null
          curl --fail --silent --header "Host: api.runlane.localhost" http://127.0.0.1:18080/health/ready > /dev/null
          curl --fail --silent --header "Host: api.runlane.localhost" http://127.0.0.1:18080/health/queue > /dev/null
          curl --fail --silent --header "Host: runlane.localhost" http://127.0.0.1:18080/ > /dev/null

          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps --all

      - name: Show deployment logs on failure
        if: failure()
        shell: bash
        run: |
          if [[ -f "$ENV_FILE" ]]; then
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps --all || true
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --no-color --tail=300 || true
          fi

      - name: Stop deployment stack
        if: always()
        shell: bash
        run: |
          if [[ -f "$ENV_FILE" ]]; then
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" down -v --remove-orphans || true
          fi
