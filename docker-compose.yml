name: ${RUNLANE_COMPOSE_PROJECT_NAME:-runlane-core}

x-build-args: &build-args
  NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
  PRISMA_ENGINES_MIRROR: ${PRISMA_ENGINES_MIRROR:-https://binaries.prisma.sh}
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,postgres,redis,migrator,api,worker,web}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,postgres,redis,migrator,api,worker,web}

x-build: &app-build
  context: .
  dockerfile: Dockerfile
  args: *build-args

x-app-environment: &app-environment
  RUNTIME_PROFILE: local
  API_HOST: 0.0.0.0
  API_PORT: 4600
  WORKER_HOST: 0.0.0.0
  WORKER_PORT: 4601
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
  WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-10000}
  WORKER_HEARTBEAT_TTL_SECONDS: ${WORKER_HEARTBEAT_TTL_SECONDS:-45}
  EXECUTION_RETRY_MAX_ATTEMPTS: ${EXECUTION_RETRY_MAX_ATTEMPTS:-3}
  EXECUTION_RETRY_BASE_DELAY_MS: ${EXECUTION_RETRY_BASE_DELAY_MS:-500}
  EXECUTION_RETRY_MAX_DELAY_MS: ${EXECUTION_RETRY_MAX_DELAY_MS:-30000}
  API_URL: ${RUNLANE_PUBLIC_API_URL:-http://127.0.0.1:14600}
  APP_URL: ${RUNLANE_PUBLIC_APP_URL:-http://127.0.0.1:14610}
  DATABASE_URL: postgresql://${POSTGRES_USER:-runlane}:${POSTGRES_PASSWORD:-runlane_local_database}@postgres:5432/${POSTGRES_DB:-runlane}?schema=public
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:14610,http://localhost:14610,http://localhost:4610,http://127.0.0.1:4610,http://127.0.0.1:14600,http://localhost:14600,http://localhost:4600,http://127.0.0.1:4600}
  RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-25}
  MAX_PAYLOAD_SIZE: ${MAX_PAYLOAD_SIZE:-1048576}
  API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
  API_DOCS_PATH: ${API_DOCS_PATH:-docs}
  HEALTH_CHECK_TIMEOUT_MS: ${HEALTH_CHECK_TIMEOUT_MS:-3000}
  REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-15000}

x-app-security: &app-security
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 20s
  tmpfs:
    - /tmp:size=64m,mode=1777

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'

services:
  postgres:
    image: postgres:17.10-alpine3.23
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runlane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runlane_local_database}
      POSTGRES_DB: ${POSTGRES_DB:-runlane}
    ports:
      - '127.0.0.1:${RUNLANE_POSTGRES_PORT:-15432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging: *default-logging
    networks:
      - runtime

  redis:
    image: redis:8.6.4-alpine3.23
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
      - --save
      - '60'
      - '1000'
      - --maxmemory-policy
      - noeviction
    ports:
      - '127.0.0.1:${RUNLANE_REDIS_PORT:-16379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    logging: *default-logging
    networks:
      - runtime

  migrator:
    <<: *app-security
    build:
      <<: *app-build
      target: migrator
    restart: 'no'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-runlane}:${POSTGRES_PASSWORD:-runlane_local_database}@postgres:5432/${POSTGRES_DB:-runlane}?schema=public
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - runtime

  api:
    <<: *app-security
    build:
      <<: *app-build
      target: api
    restart: unless-stopped
    environment:
      <<: *app-environment
    ports:
      - '127.0.0.1:${RUNLANE_API_PORT:-14600}:4600'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:4600/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    logging: *default-logging
    networks:
      - runtime

  worker:
    <<: *app-security
    build:
      <<: *app-build
      target: worker
    restart: unless-stopped
    environment:
      <<: *app-environment
    expose:
      - '4601'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:4601/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    logging: *default-logging
    networks:
      - runtime

  web:
    build:
      <<: *app-build
      target: web
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /config:size=16m,mode=0755
      - /data:size=16m,mode=0755
    ports:
      - '127.0.0.1:${RUNLANE_WEB_PORT:-14610}:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging: *default-logging
    networks:
      - runtime

volumes:
  postgres-data:
  redis-data:

networks:
  runtime:
    driver: bridge
